# Webhook definitions for real-time notifications
webhooks:
  transactionCreated:
    post:
      summary: Transaction created notification
      description: Sent when a new transaction is created
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                event:
                  type: string
                  example: 'transaction.created'
                data:
                  $ref: '#/components/schemas/Transaction'
                timestamp:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Webhook processed successfully

  transactionUpdated:
    post:
      summary: Transaction updated notification
      description: Sent when a transaction is updated
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                event:
                  type: string
                  example: 'transaction.updated'
                data:
                  $ref: '#/components/schemas/Transaction'
                timestamp:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Webhook processed successfully

  transactionDeleted:
    post:
      summary: Transaction deleted notification
      description: Sent when a transaction is deleted
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                event:
                  type: string
                  example: 'transaction.deleted'
                data:
                  type: object
                  properties:
                    transactionId:
                      type: string
                      format: uuid
                    userId:
                      type: string
                      format: uuid
                timestamp:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Webhook processed successfully